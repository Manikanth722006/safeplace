<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeBox | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">SAFE<span>BOX</span></a>
    <div class="nav-links">
      <a href="track.html">Track Complaint</a>
    </div>
  </nav>

  <div class="container auth-container">
    <div class="glass-card">
      <div class="header-text">
        <h1>Student Portal</h1>
        <p>Login securely to report an issue</p>
      </div>
      
      <div id="errorMsg" class="alert error"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Username / Roll Number</label>
          <input type="text" id="username" class="form-control" required placeholder="Ex: CS2024-001">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="margin-bottom: 1rem;">Log In</button>
      </form>
      
      <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Not registered yet?</p>
        <button id="showRegisterBtn" class="btn btn-outline" style="width: 100%;">Create Account</button>
      </div>

      <form id="registerForm" style="display: none; margin-top: 2rem;">
        <h3 style="margin-bottom: 1rem;">Register</h3>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </form>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
